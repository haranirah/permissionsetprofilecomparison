name: Compare Profile/PermissionSet (RAW DIFF + CLEAN)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name"
        required: true
        default: "main"
      metadataName:
        description: "Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g @salesforce/cli

      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      - run: |
          NAME="${{ github.event.inputs.metadataName }}"

          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

      - run: |
          NAME="${{ github.event.inputs.metadataName }}"

          PROFILE_PATH="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS_PATH="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE_PATH" ]; then
            echo "FILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          elif [ -f "$PS_PATH" ]; then
            echo "FILE_PATH=$PS_PATH" >> $GITHUB_ENV
          else
            echo "File not found!"
            exit 1
          fi

      - run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

      - name: Show Diff (Raw + Clean)
        run: |
          echo "## 🔍 Raw Diff" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`diff" >> $GITHUB_STEP_SUMMARY
          cat diff.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "" > pretty.txt
          echo "=== 🔍 PERMISSION CHANGES ===" >> pretty.txt
          echo "" >> pretty.txt

          awk '
          /<object>/ {
            obj=$0
            gsub(/.*<object>|<\/object>.*/, "", obj)
          }

          /allow(Create|Edit|Delete|Read)/ {
            if ($0 ~ /^\+/) {
              orgLine=$0
              getline nextLine

              if (nextLine ~ /^-/) {
                branchLine=nextLine

                org=orgLine
                branch=branchLine

                gsub(/.*<|>.*/, "", org)
                gsub(/.*<|>.*/, "", branch)

                perm=$0
                gsub(/.*<|>.*/, "", perm)

                if (org != branch) {
                  printf "Object: %s\n", obj >> "pretty.txt"
                  printf "  • %s : %s ➜ %s\n", perm, org, branch >> "pretty.txt"
                }
              }
            }
          }' diff.txt

          echo "" >> pretty.txt
          echo "=== 📌 SUMMARY ===" >> pretty.txt
          echo "Permissions differ between Org and Branch." >> pretty.txt

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✨ Clean Comparison" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat pretty.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: comparison-output
          path: |
            diff.txt
            pretty.txt