name: Compare Specific Profile/PermissionSet (Clean RAW)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Enter branch name"
        required: true
        default: "main"
      metadataName:
        description: "Enter Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout selected branch
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Salesforce CLI
      - name: Install CLI
        run: npm install -g @salesforce/cli

      # 4. Authenticate Org
      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      # 5. Locate Metadata File
      - name: Locate Metadata File
        run: |
          NAME="${{ github.event.inputs.metadataName }}"

          PROFILE_PATH="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS_PATH="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE_PATH" ]; then
            echo "FILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          elif [ -f "$PS_PATH" ]; then
            echo "FILE_PATH=$PS_PATH" >> $GITHUB_ENV
          else
            echo "File not found! Check your spelling."
            exit 1
          fi

      # 6. Backup Branch State
      - name: Backup Branch State
        run: cp "$FILE_PATH" branch-backup.xml

      # 7. Retrieve Org Metadata (Overwrites workspace)
      - name: Retrieve Live Org State
        run: |
          NAME="${{ github.event.inputs.metadataName }}"
          
          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

          cp "$FILE_PATH" org-current.xml

      # 8. Generate Raw Git Diff
      - name: Generate Diff
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

      # 9. Dynamic Python Comparison (Now tracks everything like VS Code)
      - name: Run Python Comparison
        run: |
          cat << 'EOF' > compare.py
          import xml.etree.ElementTree as ET
          import os

          # Map every standard Salesforce metadata block to its unique identifying sub-tag
          TAG_MAP = {
              'objectPermissions': 'object',
              'fieldPermissions': 'field',
              'classAccesses': 'apexClass',
              'pageAccesses': 'apexPage',
              'userPermissions': 'name',
              'recordTypeVisibilities': 'recordType',
              'tabVisibilities': 'tab',
              'applicationVisibilities': 'application',
              'customPermissions': 'name',
              'externalDataSourceAccesses': 'externalDataSource',
              'customMetadataTypeAccesses': 'customMetadataType',
              'customSettingAccesses': 'customSetting'
          }

          # Clean display labels
          TYPE_LABELS = {
              'objectPermissions': 'Object',
              'fieldPermissions': 'Field',
              'classAccesses': 'Apex Class',
              'pageAccesses': 'Visualforce Page',
              'userPermissions': 'System/User Permission',
              'recordTypeVisibilities': 'Record Type',
              'tabVisibilities': 'Tab Visibility',
              'applicationVisibilities': 'App visibility',
              'customPermissions': 'Custom Permission',
              'externalDataSourceAccesses': 'External Data Source',
              'customMetadataTypeAccesses': 'Custom Metadata',
              'customSettingAccesses': 'Custom Setting'
          }

          def parse_sf_xml(file_path):
              if not os.path.exists(file_path):
                  return {}

              with open(file_path, 'r') as f:
                  content = f.read()

              content = content.replace(' xmlns="http://soap.sforce.com/2006/04/metadata"', '')

              try:
                  root = ET.fromstring(content)
              except Exception:
                  return {}

              perms = {}

              for child in root:
                  tag = child.tag
                  if tag in TAG_MAP:
                      id_tag = TAG_MAP[tag]
                      label = TYPE_LABELS.get(tag, tag)
                      
                      id_val = child.findtext(id_tag)
                      if not id_val:
                          continue

                      key = f"{label}: {id_val}"
                      
                      if key not in perms:
                          perms[key] = {}

                      for sub_child in child:
                          if sub_child.tag != id_tag:
                              perms[key][sub_child.tag] = sub_child.text

              return perms

          branch_perms = parse_sf_xml('branch-backup.xml')
          org_perms = parse_sf_xml('org-current.xml')

          changes = {}
          all_keys = set(branch_perms.keys()).union(org_perms.keys())

          for key in all_keys:
              b_p = branch_perms.get(key, {})
              o_p = org_perms.get(key, {})

              all_p_keys = set(list(b_p.keys()) + list(o_p.keys()))

              for p_key in all_p_keys:
                  b_val = b_p.get(p_key, 'N/A')
                  o_val = o_p.get(p_key, 'N/A')

                  if b_val != o_val:
                      if key not in changes:
                          changes[key] = []
                      changes[key].append(f"  • {p_key} : {o_val} ➜ {b_val}")

          with open('pretty.txt', 'w') as f:
              f.write("=== 🔍 PERMISSION CHANGES ===\n\n")
              if not changes:
                  f.write("No changes found.\n")
              else:
                  for key, logs in sorted(changes.items()):
                      f.write(f"🔹 {key}\n")
                      for log in sorted(logs):
                          f.write(f"{log}\n")
                      f.write("--------------------------------------------------\n\n")
          EOF

          python3 compare.py

      # 10. Show in GitHub UI
      - name: Print Summary
        run: |
          echo "## ✨ Clean Permission Comparison (Org ➜ Branch)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat pretty.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "## 🔍 Raw Git Diff" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`diff" >> $GITHUB_STEP_SUMMARY
          cat diff.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # 11. Upload Artifacts
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: comparison-output
          path: |
            diff.txt
            pretty.txt