name: Compare Specific Profile/PermissionSet (AI Enhanced)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Enter branch name"
        required: true
        default: "main"
      metadataName:
        description: "Enter Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install CLI
      - run: npm install -g @salesforce/cli

      # 4. Authenticate
      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      # 5. Retrieve Metadata
      - name: Retrieve Metadata
        run: |
          NAME="${{ github.event.inputs.metadataName }}"
          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

      # 6. Locate File
      - name: Locate Metadata File
        run: |
          NAME="${{ github.event.inputs.metadataName }}"
          PROFILE_PATH="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS_PATH="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE_PATH" ]; then
            echo "FILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          elif [ -f "$PS_PATH" ]; then
            echo "FILE_PATH=$PS_PATH" >> $GITHUB_ENV
          else
            echo "File not found!"
            exit 1
          fi

      # 7. Generate Diff
      - name: Generate Diff
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

      # 8. Extract Important Changes
      - name: Prepare Clean Data (ORG ➜ BRANCH)
        run: |
          awk '
          /allow(Create|Edit|Delete|Read)/ {
            if ($0 ~ /^\+/) {
              org=$0
              getline nextLine
              if (nextLine ~ /^-/) {
                branch=nextLine

                gsub(/.*<|>.*/, "", org)
                gsub(/.*<|>.*/, "", branch)

                print org " ➜ " branch
              }
            }
          }' diff.txt > clean.txt

          echo "==== CLEAN DATA ===="
          cat clean.txt

      # 9. AI Processing (FORMAT + EXPLANATION)
      - name: AI Summary
        run: |
          jq -n \
            --arg data "$(cat clean.txt)" \
            '{
              "model": "xiaomi/mimo-v2-omni",
              "max_tokens": 350,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a Salesforce DevOps expert."
                },
                {
                  "role": "user",
                  "content": "Convert the following Salesforce permission comparison into a clean and structured format.\n\nRULES:\n- Show permissions clearly\n- Keep it simple and readable\n\nThen provide:\n1. SUMMARY (what changed)\n2. IMPACT (business impact)\n3. WHY AI USED (why AI helps in this process)\n\nFORMAT:\n\n=== 🔍 PERMISSION CHANGES ===\n<clean output>\n\n=== 📌 SUMMARY ===\n<1-2 lines>\n\n=== ⚠️ IMPACT ===\n<1 line>\n\n=== 🤖 WHY AI ===\n<1-2 lines explaining automation benefits>\n\nDATA:\n\($data)"
                }
              ]
            }' > payload.json

          curl https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > ai-response.json

      # 10. Extract Output
      - name: Extract Summary
        run: |
          CONTENT=$(cat ai-response.json | jq -r '.choices[0].message.content // empty')

          if [ -z "$CONTENT" ]; then
            echo "AI failed, showing raw response"
            cat ai-response.json > summary.txt
          else
            echo "$CONTENT" > summary.txt
          fi

          echo "==== FINAL OUTPUT ===="
          cat summary.txt

          cat summary.txt >> $GITHUB_STEP_SUMMARY

      # 11. Upload Result
      - uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: summary.txt