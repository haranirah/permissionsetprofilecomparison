name: Compare Specific Profile/PermissionSet (AI)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Enter branch name"
        required: true
        default: "main"
      metadataName:
        description: "Enter Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout selected branch
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Salesforce CLI
      - name: Install CLI
        run: npm install -g @salesforce/cli

      # 4. Authenticate Org
      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      # 5. Retrieve Metadata
      - name: Retrieve Metadata
        run: |
          NAME="${{ github.event.inputs.metadataName }}"

          echo "Retrieving Profile..."
          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true

          echo "Retrieving Permission Set..."
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

      # 6. Locate Metadata File
      - name: Locate Metadata File
        run: |
          NAME="${{ github.event.inputs.metadataName }}"

          PROFILE_PATH="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS_PATH="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE_PATH" ]; then
            echo "FILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          elif [ -f "$PS_PATH" ]; then
            echo "FILE_PATH=$PS_PATH" >> $GITHUB_ENV
          else
            echo "File not found!"
            exit 1
          fi

      # 7. Generate Diff
      - name: Generate Diff
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

          echo "==== RAW DIFF ===="
          cat diff.txt

      # 8. Filter only important permission lines
      - name: Filter Important Changes
        run: |
          grep -E "allow(Create|Edit|Delete|Read)" diff.txt > filtered.txt || true
          head -c 3000 filtered.txt > trimmed.txt

          echo "==== FILTERED DIFF ===="
          cat trimmed.txt

      # 🔥 9. Convert to ORG ➜ BRANCH (LOGIC FIX - NO AI CONFUSION)
      - name: Prepare Clean Data
        run: |
          awk '
          /allow(Create|Edit|Delete|Read)/ {
            if ($0 ~ /^\+/) {
              org=$0
              getline nextLine
              if (nextLine ~ /^-/) {
                branch=nextLine

                gsub(/.*<|>.*/, "", org)
                gsub(/.*<|>.*/, "", branch)

                print org " ➜ " branch
              }
            }
          }' diff.txt > clean.txt

          echo "==== CLEAN DATA ===="
          cat clean.txt

      # 🤖 10. AI Formatting (ONLY FORMAT, NO LOGIC)
      - name: AI Summary
        run: |
          jq -n \
            --arg diff "$(cat clean.txt)" \
            '{
              "model": "xiaomi/mimo-v2-omni",
              "max_tokens": 300,
              "messages": [
                {
                  "role": "system",
                  "content": "Format Salesforce permission comparison."
                },
                {
                  "role": "user",
                  "content": "Format this clean comparison:\n\nObject: Account\n- Create: false ➜ true\n- Edit: false ➜ true\n- Delete: false ➜ true\n\nKeep it simple and clean.\n\nData:\n\($diff)"
                }
              ]
            }' > payload.json

          curl https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > ai-response.json

      # 11. Extract Summary (SAFE)
      - name: Extract Summary
        run: |
          CONTENT=$(cat ai-response.json | jq -r '.choices[0].message.content // empty')

          if [ -z "$CONTENT" ]; then
            echo "AI failed, showing raw response"
            cat ai-response.json > summary.txt
          else
            echo "$CONTENT" > summary.txt
          fi

          echo "==== FINAL OUTPUT ===="
          cat summary.txt

          cat summary.txt >> $GITHUB_STEP_SUMMARY

      # 12. Upload Result
      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: summary.txt