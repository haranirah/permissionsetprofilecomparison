name: Compare Profile/PermissionSet (AI)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name"
        required: true
        default: "main"
      metadataName:
        description: "Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout branch
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Salesforce CLI
      - name: Install CLI
        run: npm install -g @salesforce/cli

      # 4. Authenticate org
      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      # 5. Retrieve metadata
      - name: Retrieve Metadata
        run: |
          NAME="${{ github.event.inputs.metadataName }}"
          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

      # 6. Locate metadata file
      - name: Find Metadata File
        run: |
          NAME="${{ github.event.inputs.metadataName }}"
          PROFILE="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE" ]; then
            echo "FILE_PATH=$PROFILE" >> $GITHUB_ENV
          elif [ -f "$PS" ]; then
            echo "FILE_PATH=$PS" >> $GITHUB_ENV
          else
            echo "File not found!"
            exit 1
          fi

      # 7. Generate git diff
      - name: Git Diff
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

          echo "==== RAW DIFF ===="
          cat diff.txt

      # 8. Extract clean data
      - name: Parse Diff
        run: |
          awk -f parse-diff.awk diff.txt > clean.txt

          echo "==== CLEAN DATA ===="
          cat clean.txt

          if [ ! -s clean.txt ]; then
            echo "No permission changes found." > clean.txt
          fi

      # 9. AI Summary
      - name: AI Summary
        run: |
          jq -n \
            --arg data "$(cat clean.txt)" \
            '{
              "model": "xiaomi/mimo-v2-omni",
              "max_tokens": 150,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a Salesforce expert."
                },
                {
                  "role": "user",
                  "content": "Based ONLY on the following permission changes, generate:\n1. SUMMARY (1 line)\n2. IMPACT (1 line)\n\nDo NOT repeat or modify the data.\n\nDATA:\n\($data)"
                }
              ]
            }' > payload.json

          curl https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > ai-response.json

      # 10. Extract output
      - name: Extract Summary
        run: |
          CONTENT=$(jq -r '.choices[0].message.content // empty' ai-response.json)

          if [ -z "$CONTENT" ]; then
            echo "⚠️ AI failed, using clean data"
            cp clean.txt summary.txt
          else
            echo "$CONTENT" > summary.txt
          fi

          echo "==== FINAL OUTPUT ===="
          cat summary.txt

          echo "## ✨ Permission Comparison" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat summary.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # 11. Upload summary
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: summary.txt