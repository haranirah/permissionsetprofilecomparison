name: Compare Specific Profile/PermissionSet (AI Enhanced)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Enter branch name"
        required: true
        default: "main"
      metadataName:
        description: "Enter Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Salesforce CLI
      - run: npm install -g @salesforce/cli

      # 4. Authenticate Org
      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      # 5. Retrieve Metadata
      - name: Retrieve Metadata
        run: |
          NAME="${{ github.event.inputs.metadataName }}"
          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

      # 6. Locate Metadata File
      - name: Locate Metadata File
        run: |
          NAME="${{ github.event.inputs.metadataName }}"
          PROFILE_PATH="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS_PATH="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE_PATH" ]; then
            echo "FILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          elif [ -f "$PS_PATH" ]; then
            echo "FILE_PATH=$PS_PATH" >> $GITHUB_ENV
          else
            echo "File not found!"
            exit 1
          fi

      # 7. Generate Diff
      - name: Generate Diff
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

          echo "==== RAW DIFF ===="
          cat diff.txt

      # 8. Extract Clean Data using AWK FILE (FIXED)
      - name: Prepare Clean Data
        run: |
          awk -f parse-diff.awk diff.txt > clean.txt

          echo "==== CLEAN DATA ===="
          cat clean.txt

          # Prevent empty file issue
          if [ ! -s clean.txt ]; then
            echo "No permission changes found." > clean.txt
          fi

      # 9. AI Formatting (SAFE + DEBUG)
      - name: AI Summary
        run: |
          jq -n \
            --arg data "$(cat clean.txt)" \
            '{
              "model": "xiaomi/mimo-v2-omni",
              "max_tokens": 200,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a strict formatter. Do NOT invent any data."
                },
                {
                  "role": "user",
                  "content": "Format the following Salesforce permission changes.\n\nRULES:\n- Use ONLY given data\n- Do NOT modify values\n\nAdd:\n1. Summary (1 line)\n2. Impact (1 line)\n\nDATA:\n\($data)"
                }
              ]
            }' > payload.json

          echo "==== PAYLOAD ===="
          cat payload.json

          curl https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > ai-response.json

          echo "==== AI RESPONSE ===="
          cat ai-response.json

      # 10. Extract Output (FIXED FALLBACK)
      - name: Extract Summary
        run: |
          CONTENT=$(jq -r '.choices[0].message.content // empty' ai-response.json)

          if [ -z "$CONTENT" ]; then
            echo "⚠️ AI failed, using clean data"
            cp clean.txt summary.txt
          else
            echo "$CONTENT" > summary.txt
          fi

          echo "==== FINAL OUTPUT ===="
          cat summary.txt

          echo "## ✨ Permission Comparison" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat summary.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # 11. Upload Result
      - uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: summary.txt