name: Compare Specific Profile/PermissionSet (AI)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Enter branch name"
        required: true
        default: "main"
      metadataName:
        description: "Enter Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout selected branch
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Salesforce CLI
      - name: Install CLI
        run: npm install -g @salesforce/cli

      # 4. Authenticate Org
      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      # 5. Retrieve Metadata
      - name: Retrieve Metadata
        run: |
          NAME="${{ github.event.inputs.metadataName }}"

          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

      # 6. Locate Metadata File
      - name: Locate Metadata File
        run: |
          NAME="${{ github.event.inputs.metadataName }}"

          PROFILE_PATH="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS_PATH="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE_PATH" ]; then
            echo "FILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          elif [ -f "$PS_PATH" ]; then
            echo "FILE_PATH=$PS_PATH" >> $GITHUB_ENV
          else
            echo "File not found!"
            exit 1
          fi

      # 7. Generate Diff
      - name: Generate Diff
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

      # 🔥 8. FILTER ONLY IMPORTANT PERMISSIONS (KEY CHANGE)
      - name: Filter Important Changes
        run: |
          grep -E "allow(Create|Edit|Delete|Read)" diff.txt > filtered.txt || true
          head -c 5000 filtered.txt > trimmed.txt

          echo "==== FILTERED DIFF ===="
          cat trimmed.txt

      # 🤖 9. AI SUMMARY (LOW TOKEN SAFE)
      - name: AI Summary
        run: |
          jq -n \
            --arg diff "$(cat trimmed.txt)" \
            '{
              "model": "xiaomi/mimo-v2-omni",
              "max_tokens": 600,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a Salesforce expert. Format permission changes clearly."
                },
                {
                  "role": "user",
                  "content": "Convert this into clean format:\n\n=== 🔍 PERMISSION CHANGES ===\nObject: <name>\n  • Create  : true ➜ false\n  • Edit    : true ➜ false\n\n=== 📌 SUMMARY ===\n1 short line\n\n=== ⚠️ IMPACT ===\n1 short line\n\nData:\n" + $diff
                }
              ]
            }' > payload.json

          curl https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > ai-response.json

      # 10. Extract Summary
      - name: Extract Summary
        run: |
          cat ai-response.json | jq -r '.choices[0].message.content // .error.message' > summary.txt

          echo "==== AI SUMMARY ===="
          cat summary.txt

          cat summary.txt >> $GITHUB_STEP_SUMMARY

      # 11. Upload Result
      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: summary.txt