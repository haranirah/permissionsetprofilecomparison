name: Compare Specific Profile/PermissionSet (AI)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Enter branch name"
        required: true
        default: "main"
      metadataName:
        description: "Enter Profile or PermissionSet name"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout selected branch
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Salesforce CLI
      - name: Install CLI
        run: npm install -g @salesforce/cli

      # 4. Authenticate Org
      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias targetOrg

      # 5. Retrieve Metadata
      - name: Retrieve Metadata
        run: |
          NAME="${{ github.event.inputs.metadataName }}"

          echo "Retrieving Profile..."
          sf project retrieve start -m "Profile:$NAME" -o targetOrg || true

          echo "Retrieving Permission Set..."
          sf project retrieve start -m "PermissionSet:$NAME" -o targetOrg || true

      # 6. Locate Metadata File
      - name: Locate Metadata File
        run: |
          NAME="${{ github.event.inputs.metadataName }}"

          PROFILE_PATH="force-app/main/default/profiles/$NAME.profile-meta.xml"
          PS_PATH="force-app/main/default/permissionsets/$NAME.permissionset-meta.xml"

          if [ -f "$PROFILE_PATH" ]; then
            echo "FILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          elif [ -f "$PS_PATH" ]; then
            echo "FILE_PATH=$PS_PATH" >> $GITHUB_ENV
          else
            echo "File not found! It may not exist in the org."
            exit 1
          fi

      # 7. Generate Diff
      - name: Generate Diff
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git add -N "$FILE_PATH" || true
          git diff "$FILE_PATH" > diff.txt

          echo "==== RAW DIFF ===="
          cat diff.txt

      # 8. Trim Diff
      - name: Trim Diff
        run: |
          head -c 12000 diff.txt > trimmed-diff.txt

      # 9. AI Summary using Xiaomi MiMo-V2-Omni (Indentation Fixed)
      - name: AI Summary
        run: |
          jq -n \
            --arg diff "$(cat trimmed-diff.txt)" \
            '{
              "model": "xiaomi/mimo-v2-omni",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a Salesforce expert. Convert metadata diff into a clean, structured comparison output."
                },
                {
                  "role": "user",
                  "content": "Analyze the Salesforce diff and present it in a clean and visually structured format.\n\nRules:\n- Show comparison first (clean and aligned)\n- Group by object\n- Highlight ONLY changed values\n- Use symbols: ➜ for change\n- Use simple words: Create, Edit, Delete, Read\n- Make it visually clean and easy to scan\n- No unnecessary explanation in comparison section\n\nThen add a small summary at the end.\n\nFORMAT:\n\n=== 🔍 PERMISSION CHANGES ===\n\nObject: <Object Name>\n  • Create  : true ➜ false\n  • Edit    : true ➜ false\n  • Delete  : true ➜ false\n\n(only show changed ones)\n\n=== 📌 SUMMARY ===\n- 1–2 lines explaining what changed in simple words\n\n=== ⚠️ IMPACT ===\n- Short impact statement (1 line)\n\nDiff:\n\($diff)"
                }
              ]
            }' > payload.json

          curl https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > ai-response.json

      # 10. Extract Summary
      - name: Extract Summary
        run: |
          cat ai-response.json | jq -r '.choices[0].message.content // .error.message // "Failed to parse AI response."' > summary.txt

          echo "==== AI SUMMARY ===="
          cat summary.txt

          # THIS LINE PRINTS IT DIRECTLY TO THE GITHUB ACTION PAGE
          cat summary.txt >> $GITHUB_STEP_SUMMARY

      # 11. Upload Result
      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: summary.txt